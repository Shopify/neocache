name: Miri

# Miri detects undefined behaviour in `unsafe` Rust by interpreting the MIR
# under a strict aliasing model (Stacked Borrows / Tree Borrows). This crate
# uses `unsafe` extensively (hashbrown raw API, custom RwLock, raw-pointer
# guards) so a Miri run on every push is high signal.
#
# Miri requires nightly Rust and is significantly slower than `cargo test`
# (~10–50x), so we run only a curated subset of tests rather than the full
# suite.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  # Tighten Miri's aliasing model to Tree Borrows (stricter than the default
  # Stacked Borrows, and the direction the language is heading). Disable
  # isolation so tests that touch the filesystem (criterion, etc.) don't fail
  # — none of our tests require it, but `-Zmiri-disable-isolation` is the
  # standard knob to flip if they do.
  MIRIFLAGS: "-Zmiri-tree-borrows -Zmiri-strict-provenance"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  miri:
    name: cargo miri test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master @ 2026-03-27
        with:
          toolchain: nightly
          components: miri, rust-src
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          key: miri
      - name: Setup Miri
        run: cargo miri setup
      # Run a focused subset of tests:
      #   - The inline #[test]s in src/lib.rs cover all major code paths in
      #     the public API (insert, get, remove, entry, retain, iter, eviction).
      #   - tests/coverage.rs exercises every public method, ref-type
      #     projection, and entry variant.
      #   - tests/concurrent.rs is excluded — Miri serializes threads, so
      #     concurrency tests run but do not exercise real interleavings.
      #     We use `loom` for that (see loom.yml).
      - name: Miri — unit tests
        run: cargo miri test --all-features --lib
      - name: Miri — coverage suite
        run: cargo miri test --all-features --test coverage
